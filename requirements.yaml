  # ═══ UI COMPONENTS ═══

  - id: ui-001
    name: "Grid report — reusable component (Athena-portable)"
    status: "Completed"
    priority: "MVP"
    eval_driven: false
    technology_stack:
      - "Vanilla JS/HTML (portable — no React dependency for standalone)"
      - "Tailwind CDN for styling (obsidian palette)"
      - "Data-driven: renders from recommendations[] + CATEGORY_CONFIG"
      - "Callback pattern: onExecute(rec), onRate(n) — parent wires to ADK or Athena"
      - "Port to React AgentGridReport.tsx for Athena later"
    description: |
      Data-driven grid report that renders categorized recommendations
      with per-row Accept buttons. Reusable for ANY agent — not
      calendar-specific. Configured via manifest rendering config.

      DUAL DEPLOYMENT: Must work in TWO contexts with ZERO code changes:
      1. Standalone (schedule-analyst app on Cloud Run) — connects directly to ADK backend
      2. Inside Athena — connects through Athena dispatcher, ratings feed intent scoring

      Components are pure UI with props/callbacks. No agent-specific logic.
      No imports from athena-command-center/. Parent wires onExecute to
      either ADK API (standalone) or Athena dispatch (inside Athena).

      In Athena, this grid auto-generates from manifest rendering config:
        rendering:
          type: "grid"
          columns: [{field, label, width, format}]
          categories: {field, colors: {conflicts: "rose", ...}}
          rating: {enabled: true, self_eval_field: "confidence_score"}

      1,000 teams won't code custom UIs. They submit a manifest.
      The grid renders from the manifest + dispatch result data.
    acceptance_criteria:
      - "Grid renders from recommendations[] array (not hardcoded)"
      - "Categories group rows with colored headers"
      - "Per-row Accept button triggers execute callback"
      - "Row states: pending → running → accepted/failed"
      - "Accept All button processes all pending rows"
      - "Star rating widget functional"
      - "Summary text with highlighted metrics"
      - "Component has no agent-specific logic — pure props/callbacks"
      - "No imports from athena-command-center/ — portable standalone"
      - "onExecute callback pattern — parent wires to ADK or Athena dispatch"
    test_steps:
      - "Open UI in Chrome"
      - "Assert: grid shows categorized recommendations from real calendar data"
      - "Click Accept on one row → assert loader then accepted state"
      - "Click Accept All → assert all rows process"
      - "Click stars → assert rating updates"
      - "Assert: no hardcoded event names in the component source code"
    implementation_status:
      implemented: true
      tested: true
      test_count: 0
      notes: "Grid loads from real /schedule-analyst/analyze API. Accept buttons call /schedule-analyst/question. Categories, row states, Accept All, star rating all functional. Browser-verified localhost:8080 — 11 recs from real calendar."

