      User clicks mic/orb and speaks. Agent receives audio input via
      Gemini Live API (bidiGenerateContent) through ADK.
    acceptance_criteria:
      - "Mic button/orb toggles listening state"
      - "Audio is streamed to Gemini 2.5 Flash Native Audio via ADK"
      - "User's speech is transcribed and processed by the agent"
    test_steps:
      - "Open agent UI in Chrome"
      - "Click the mic button or orb"
      - "Say: 'What does tomorrow look like?'"
      - "Assert: agent processes the speech (transcript shows user text OR agent responds)"
      - "Assert: no console errors matching /bidiGenerateContent|404|model.*not found/"
    implementation_status:
      implemented: true
      tested: true
      test_count: 0
      notes: "Jessica confirmed voice working 2026-03-16. Model: gemini-2.5-flash-native-audio-latest"

