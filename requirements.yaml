# Schedule Analyst Agent — Requirements & Acceptance Criteria
#
# Every feature has:
#   - acceptance_criteria: what "done" looks like
#   - test_steps: literal steps to verify (browser-first)
#   - implementation_status: { implemented: true/false, tested: true/false, test_count: N }
#   - eval_driven: true/false
#
# RULE: tested: true ONLY if verified in the CUSTOM UI (localhost:8080), not the ADK dev UI.
# Unit tests alone do NOT count as tested.
# Voice tests (voice-001, voice-002, voice-003) require Jessica's sign-off — agents cannot mark PASS.
#
# ═══════════════════════════════════════════════════════════
# BUY VS BUILD — USE THESE, DON'T REBUILD
# ═══════════════════════════════════════════════════════════
#
# AUDIO PIPELINE (copy from Google's official repo — Apache 2.0):
#   Source: github.com/google-gemini/live-api-web-console
#   - src/lib/genai-live-client.ts  → WebSocket client for Gemini Live API
#   - src/lib/audio-recorder.ts     → 16kHz mic capture with volume metering
#   - src/lib/audio-streamer.ts     → 24kHz audio playback from Gemini
#   - src/lib/worklets/vol-meter.ts → AudioWorklet for real-time volume
#   - src/hooks/use-live-api.ts     → React hook (or adapt for vanilla JS)
#   - src/contexts/LiveAPIContext.tsx → React context wrapper
#   DO NOT build a custom WebSocket audio pipeline. Use Google's.
#
# VOICE ORB (copy from community — check license):
#   Source: github.com/tarenberg/VoiceChat — VoiceOrb.tsx
#   - 200 lines, self-contained, 4 states (idle/connecting/listening/speaking)
#   - Waveform ring reacting to audioLevel prop
#   - Wire audioLevel from volume in the live-api hook
#   OR use the orb already in static/index.html if it's working
#
# SDK:
#   - @google/genai — official Google GenAI SDK (npm install @google/genai)
#   - google-adk >= 1.3.0 — Agent Development Kit (pip install google-adk>=1.3.0)
#
# MODEL:
#   - Voice: gemini-2.5-flash-native-audio-latest (ONLY this model for voice)
#   - Text/tools: gemini-2.5-flash (for non-voice reasoning)
#   - DO NOT use gemini-2.5-flash for voice (no bidiGenerateContent support)
#   - DO NOT use gemini-2.0-flash-live (older, less capable)
#
# DO NOT BUILD:
#   - Custom WebSocket audio streaming (use Google's lib)
#   - Custom audio recording/playback (use Google's lib)
#   - Custom volume metering (use Google's worklet)
#   - Calendar embed component (use split-pane Chrome for demo video)
#   - Week view (placeholder only — bespoke, not reusable)
#
# REUSE FROM ATHENA (when porting to Athena later):
#   - RatingWidget component
#   - Obsidian Tailwind palette (same colors)
#   - IntentionsPanel (placeholder for now)
#   - BrainPanel pattern (for grooming rules display)
# ═══════════════════════════════════════════════════════════

requirements:

