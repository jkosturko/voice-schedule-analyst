<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Schedule Analyst — Project Banner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Subtle grid background */
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Glow orbs */
  .glow-1 {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(56, 189, 248, 0.12) 0%, transparent 70%);
    top: -80px;
    right: 100px;
    border-radius: 50%;
  }
  .glow-2 {
    position: absolute;
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, rgba(20, 184, 166, 0.10) 0%, transparent 70%);
    bottom: -60px;
    left: 80px;
    border-radius: 50%;
  }
  .glow-3 {
    position: absolute;
    width: 250px;
    height: 250px;
    background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, transparent 70%);
    top: 180px;
    left: 350px;
    border-radius: 50%;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 80px;
    padding: 0 80px;
    width: 100%;
  }

  /* Left side — text */
  .text-side {
    flex: 1;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #38bdf8;
    margin-bottom: 20px;
  }
  .eyebrow .dot {
    width: 6px;
    height: 6px;
    background: #38bdf8;
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  h1 {
    font-size: 52px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1.5px;
    margin-bottom: 16px;
  }
  h1 .accent {
    background: linear-gradient(135deg, #38bdf8, #14b8a6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 18px;
    color: #8b949e;
    line-height: 1.5;
    margin-bottom: 32px;
    max-width: 420px;
  }

  .badges {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: #c9d1d9;
  }
  .badge svg { width: 14px; height: 14px; }
  .badge.adk { border-color: rgba(56, 189, 248, 0.25); color: #38bdf8; }
  .badge.gemini { border-color: rgba(168, 85, 247, 0.25); color: #a855f7; }
  .badge.cloud { border-color: rgba(20, 184, 166, 0.25); color: #14b8a6; }

  /* Right side — visual */
  .visual-side {
    flex-shrink: 0;
    width: 320px;
    height: 380px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Central orb */
  .orb-ring {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 2px solid rgba(56, 189, 248, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: radial-gradient(circle at center, rgba(56, 189, 248, 0.06) 0%, transparent 70%);
  }
  .orb-ring::before {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1px solid rgba(56, 189, 248, 0.08);
  }
  .orb-ring::after {
    content: '';
    position: absolute;
    inset: -24px;
    border-radius: 50%;
    border: 1px solid rgba(56, 189, 248, 0.04);
  }

  .orb-icon {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .orb-icon svg {
    width: 64px;
    height: 64px;
    stroke: #38bdf8;
    fill: none;
    stroke-width: 1.5;
  }

  /* Floating icons */
  .float-icon {
    position: absolute;
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(13, 17, 23, 0.9);
    backdrop-filter: blur(8px);
  }
  .float-icon svg {
    width: 24px;
    height: 24px;
    stroke-width: 1.5;
    fill: none;
  }
  .float-icon.cal {
    top: 30px;
    left: 20px;
    border-color: rgba(20, 184, 166, 0.3);
  }
  .float-icon.cal svg { stroke: #14b8a6; }
  .float-icon.voice {
    top: 50px;
    right: 10px;
    border-color: rgba(168, 85, 247, 0.3);
  }
  .float-icon.voice svg { stroke: #a855f7; }
  .float-icon.ai {
    bottom: 50px;
    left: 30px;
    border-color: rgba(251, 191, 36, 0.3);
  }
  .float-icon.ai svg { stroke: #fbbf24; }
  .float-icon.cloud-icon {
    bottom: 40px;
    right: 25px;
    border-color: rgba(56, 189, 248, 0.3);
  }
  .float-icon.cloud-icon svg { stroke: #38bdf8; }

  /* Waveform bars */
  .waveform {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    align-items: flex-end;
    height: 40px;
  }
  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: linear-gradient(to top, rgba(56, 189, 248, 0.6), rgba(168, 85, 247, 0.4));
  }

  /* Competition label */
  .competition {
    position: absolute;
    bottom: 28px;
    right: 60px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #484f58;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .competition .line {
    width: 30px;
    height: 1px;
    background: #30363d;
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="glow-3"></div>

  <div class="content">
    <div class="text-side">
      <div class="eyebrow">
        <span class="dot"></span>
        Gemini Live Agent Challenge
      </div>
      <h1>
        <span class="accent">Voice</span> Schedule<br>Analyst
      </h1>
      <p class="subtitle">
        AI-powered voice calendar analysis. Talk to your schedule — it speaks back conflicts, recommendations, and optimizations.
      </p>
      <div class="badges">
        <span class="badge adk">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          Google ADK
        </span>
        <span class="badge gemini">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3v18M3 12h18M5.6 5.6l12.8 12.8M18.4 5.6L5.6 18.4"/></svg>
          Gemini Live API
        </span>
        <span class="badge cloud">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
          Cloud Run
        </span>
      </div>
    </div>

    <div class="visual-side">
      <!-- Calendar icon -->
      <div class="float-icon cal">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><rect x="7" y="14" width="3" height="3" rx="0.5"/><rect x="14" y="14" width="3" height="3" rx="0.5"/></svg>
      </div>

      <!-- Voice/audio icon -->
      <div class="float-icon voice">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </div>

      <!-- AI/sparkle icon -->
      <div class="float-icon ai">
        <svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.2H22l-6 4.8 2.4 7.2L12 16.4l-6.4 4.8L8 14l-6-4.8h7.6z"/></svg>
      </div>

      <!-- Cloud icon -->
      <div class="float-icon cloud-icon">
        <svg viewBox="0 0 24 24"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/><polyline points="12 13 12 17"/><polyline points="10 15 12 13 14 15"/></svg>
      </div>

      <!-- Central orb -->
      <div class="orb-ring">
        <div class="orb-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </div>
      </div>

      <!-- Waveform -->
      <div class="waveform">
        <div class="wave-bar" style="height: 12px;"></div>
        <div class="wave-bar" style="height: 24px;"></div>
        <div class="wave-bar" style="height: 18px;"></div>
        <div class="wave-bar" style="height: 32px;"></div>
        <div class="wave-bar" style="height: 20px;"></div>
        <div class="wave-bar" style="height: 36px;"></div>
        <div class="wave-bar" style="height: 28px;"></div>
        <div class="wave-bar" style="height: 16px;"></div>
        <div class="wave-bar" style="height: 30px;"></div>
        <div class="wave-bar" style="height: 22px;"></div>
        <div class="wave-bar" style="height: 14px;"></div>
        <div class="wave-bar" style="height: 26px;"></div>
        <div class="wave-bar" style="height: 34px;"></div>
        <div class="wave-bar" style="height: 18px;"></div>
        <div class="wave-bar" style="height: 10px;"></div>
      </div>
    </div>
  </div>

  <div class="competition">
    <span class="line"></span>
    Gemini Live Agent Challenge 2026
  </div>
</body>
</html>
